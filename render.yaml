services:
  # Backend API Service
  - type: web
    name: maverick-ascend-api
    runtime: python
    region: singapore
    plan: free
    buildCommand: |
      cd apps/api
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: cd apps/api && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 1440
      - key: ENVIRONMENT
        value: production
      - key: AI_ENABLED
        value: true
      - key: AI_PROVIDER
        value: azure
      - key: AZURE_AI_ENDPOINT
        sync: false
      - key: AZURE_AI_API_KEY
        sync: false
      - key: AZURE_AI_MODEL
        value: gpt-4o-mini
      - key: AZURE_AI_MAX_TOKENS
        value: 4000
      - key: AZURE_AI_TEMPERATURE
        value: 0.7
      - key: AI_RESUME_PARSING_ENABLED
        value: true
      - key: AI_SKILL_EXTRACTION_ENABLED
        value: true
      - key: AI_PERFORMANCE_INSIGHTS_ENABLED
        value: true
      - key: MAX_UPLOAD_SIZE
        value: 10485760
      - key: MAX_RESUME_SIZE
        value: 5242880
      - key: MAX_EXCEL_SIZE
        value: 10485760
      - key: ALLOWED_RESUME_TYPES
        value: application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document
      - key: ALLOWED_EXCEL_TYPES
        value: application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,text/csv
      - key: ALLOWED_ORIGINS
        sync: false

  # Frontend Web Service
  - type: web
    name: maverick-ascend-web
    runtime: node
    region: singapore
    plan: free
    buildCommand: |
      cd apps/web
      npm install
      npm run build
    startCommand: cd apps/web && npm start
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
      - key: NEXT_PUBLIC_API_URL
        value: https://maverick-ascend-api.onrender.com/api/v1
      - key: NEXT_PUBLIC_ENVIRONMENT
        value: production
